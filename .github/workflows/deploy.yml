name: Build & Deploy Angular App

on:
  push:
    branches:
      - master  # branch that triggers deploys

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the code
      - name: Checkout
        uses: actions/checkout@v5

      # 2. Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Run unit tests — a red test suite blocks the deploy
      - name: Run tests
        run: npm test

      # 5. Build for production
      - name: Build Angular app
        run: npm run build -- --configuration production

      # 6. Install Tailscale on the runner
      - name: Install Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      # 7. Deploy via rsync over Tailscale
      - name: Deploy to server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          # Set up SSH key
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Disable strict host checking for the Tailscale host only
          cat >> ~/.ssh/config << EOF
          Host $SSH_HOST
            StrictHostKeyChecking no
            IdentityFile ~/.ssh/deploy_key
          EOF

          # Sync build output to server
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            dist/ImageLab/browser/ \
            $SSH_USER@$SSH_HOST:$DEPLOY_PATH

      # 8. Deploy the vectorizer backend (FastAPI + VTracer)
      - name: Deploy backend
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          BACKEND_DEPLOY_PATH: ${{ secrets.BACKEND_DEPLOY_PATH }}
        run: |
          # Reuses the SSH key + host config written in the previous step.
          # Sync the backend source, never touching the server-side virtualenv.
          # 'models' is excluded so the upscaler weights fetched on the host by
          # imagelab-ensure-deps (kept out of git) aren't deleted each deploy.
          rsync -avz --delete \
            --exclude '.venv' --exclude '__pycache__' --exclude '*.pyc' --exclude 'models' \
            -e "ssh -i ~/.ssh/deploy_key" \
            server/ \
            $SSH_USER@$SSH_HOST:$BACKEND_DEPLOY_PATH

          # Create/refresh the venv, install deps, ensure system-level deps
          # (e.g. tesseract), and restart the service. Requires a one-time host
          # setup (systemd unit + nginx + sudoers + deps helper) — see
          # server/README.md.
          ssh -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" "
            set -e
            cd '$BACKEND_DEPLOY_PATH'
            python3 -m venv .venv
            .venv/bin/pip install --quiet --upgrade pip
            .venv/bin/pip install --quiet -r requirements.txt
            # Self-heal OS packages via the fixed root helper installed by
            # setup-host.sh. Skipped (with a warning) on hosts not yet
            # bootstrapped with it, so the deploy still completes.
            if [ -x /usr/local/sbin/imagelab-ensure-deps ]; then
              sudo /usr/local/sbin/imagelab-ensure-deps || echo '::warning::imagelab-ensure-deps failed; OCR may be unavailable'
            else
              echo '::warning::deps helper not installed — run setup-host.sh install on the host for OCR support'
            fi
            sudo systemctl restart imagelab-vectorizer
          "
