worker_processes auto;
pid /run/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log off;
    sendfile on;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # Backend (uvicorn in the same container). The trailing slash on
        # proxy_pass strips the /api prefix. Long timeouts because CPU
        # upscaling can take tens of seconds.
        location /api/ {
            proxy_pass http://127.0.0.1:4201/;
            client_max_body_size 12m;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # index.html must never be cached so a new deploy is picked up
        # immediately; all other build assets carry content hashes.
        location = /index.html {
            add_header Cache-Control "no-cache";
        }

        location ~* \.(?:js|css|woff2?|png|ico|svg)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # SPA fallback: deep links (e.g. /tools/resize/import) load index.html.
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
