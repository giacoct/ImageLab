<header class="app-header">
  <a class="brand" routerLink="/" aria-label="ImageLab home">
    <img ngSrc="logo.png" width="40" height="40" priority alt="ImageLab logo" class="brand-logo" />
    <span>ImageLab</span>
  </a>
  <div class="info-help" [class.is-open]="helpOpen()" (keydown.escape)="closeHelp()">
    <button
      type="button"
      class="info-help__button"
      aria-label="How to use ImageLab"
      aria-describedby="info-help-tip"
      [attr.aria-expanded]="helpOpen()"
      (click)="toggleHelp()"
      (blur)="closeHelp()"
    >
      <app-icon name="info" [size]="18" />
    </button>
    <span id="info-help-tip" role="tooltip" class="info-help__tip">
      Choose a tool, upload one or more images, adjust the settings, and download the processed
      files.
    </span>
  </div>
</header>

<main class="app-main">
  <router-outlet />
</main>
