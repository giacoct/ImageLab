<app-step-indicator current="output" [toolRoute]="tool().route" />

<section class="tool-header">
  <div>
    <div class="tool-title-row">
      <span class="tool-icon" [class.batch]="tool().batch" [class.single]="!tool().batch">
        <app-icon [name]="tool().id" [size]="22" />
      </span>
      <h1>{{ tool().title }}</h1>
    </div>
  </div>
  <p>{{ tool().description }}</p>
</section>

@if (showProgressBar()) {
  <app-progress-bar [percent]="percent()" [fileName]="currentFileName()" />
} @else if (isProcessing()) {
  <p class="processing-note" role="status">Processing…</p>
}

@if (error()) {
  <p class="error" role="alert">{{ error() }}</p>
}

<app-output-list [outputs]="outputs()" [currentToolId]="tool().id" />

<div class="output-actions">
  <a class="button secondary" routerLink="/">
    <app-icon name="arrow-left" [size]="18" />
    Back to tools
  </a>
  <button class="button" type="button" (click)="startAgain()">
    <app-icon name="plus" [size]="18" />
    New job
  </button>
</div>
