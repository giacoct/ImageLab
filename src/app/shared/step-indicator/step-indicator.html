<nav class="stepper" aria-label="Progress">
  <ol class="stepper-list">
    @for (step of steps(); track step.id) {
      <li
        class="stepper-item"
        [class.is-current]="step.isCurrent"
        [class.is-done]="step.done"
        [class.is-enabled]="step.enabled && !step.isCurrent"
      >
        @if (step.isCurrent) {
          <span class="stepper-bubble" aria-current="step">
            <span class="stepper-label">{{ step.label }}</span>
          </span>
        } @else if (step.enabled) {
          <a class="stepper-bubble" [routerLink]="step.link">
            @if (step.done) {
              <app-icon name="check" [size]="14" />
            }
            <span class="stepper-label">{{ step.label }}</span>
            @if (step.done) {
              <span class="visually-hidden">(completed)</span>
            }
          </a>
        } @else {
          <span class="stepper-bubble" aria-disabled="true">
            <span class="stepper-label">{{ step.label }}</span>
          </span>
        }
      </li>
    }
  </ol>
</nav>
