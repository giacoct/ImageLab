<app-tool-shell
  [tool]="tool"
  [files]="files()"
  [error]="error()"
  [canSubmit]="canSubmit()"
  actionLabel="Convert to SVG"
  (action)="submit()"
>
  <div class="tool-fields" [formGroup]="form">
    <div class="field">
      <label for="colors">Colors</label>
      <select id="colors" formControlName="colors">
        <option [value]="2">2</option>
        <option [value]="4">4</option>
        <option [value]="6">6</option>
        <option [value]="8">8</option>
        <option [value]="12">12</option>
        <option [value]="16">16</option>
      </select>
      <span class="field-hint">Fewer colors give a flatter, more stylized vector.</span>
    </div>

    <div class="field">
      <label for="detail">Detail</label>
      <select id="detail" formControlName="detail">
        <option [value]="128">Low</option>
        <option [value]="256">Medium</option>
        <option [value]="384">High</option>
      </select>
      <span class="field-hint">Higher detail traces finer shapes but grows the file size.</span>
    </div>
  </div>
</app-tool-shell>
