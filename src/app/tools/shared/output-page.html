<app-step-indicator current="output" [toolRoute]="tool().route" />

<section class="tool-header">
  <div>
    <div class="tool-title-row">
      <h1>{{ tool().title }}</h1>
    </div>
  </div>
  <p>{{ tool().description }}</p>
</section>

@if (showProgressBar()) {
  <app-progress-bar [percent]="percent()" [fileName]="currentFileName()" />
} @else if (isProcessing()) {
  <p class="processing-note" role="status">Processing…</p>
}

@if (error()) {
  <p class="error" role="alert">{{ error() }}</p>
}

<app-output-list [outputs]="outputs()" [currentToolId]="tool().id" />

<div class="output-actions">
  <a class="back-link back-link--home" routerLink="/">
    <svg
      viewBox="0 0 24 24"
      width="18"
      height="18"
      fill="none"
      stroke="currentColor"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round"
      aria-hidden="true"
    >
      <line x1="19" y1="12" x2="5" y2="12" />
      <polyline points="12 19 5 12 12 5" />
    </svg>
    Back to tools
  </a>
</div>
